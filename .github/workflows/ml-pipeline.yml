name: ML Model CI/CD Pipeline

on:
  push:
    branches:
      - main
      - assignment5
      - assignment6
  pull_request:

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 train.py check_threshold.py export_run_id.py --max-line-length=100

  train:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dvc-gdrive

      - name: Pull data with DVC
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: |
          dvc remote modify myremote gdrive_client_id "$GDRIVE_CLIENT_ID"
          dvc remote modify myremote gdrive_client_secret "$GDRIVE_CLIENT_SECRET"
          dvc pull

      - name: Train model
        run: |
          python train.py \
            --data_path data/apple.npy \
            --out_dir outputs \
            --experiment_name "Assignment6_CI" \
            --student_id "${{ secrets.STUDENT_ID }}" \
            --epochs 5 \
            --batch_size 64 \
            --lr 0.001 \
            --seed 42 \
            --max_samples 5000

      - name: Export Run ID to model_info.txt
        run: |
          python export_run_id.py \
            --experiment-name "Assignment6_CI" \
            --output-file model_info.txt

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Capture error logs
        if: failure()
        run: |
          echo "Training failed at $(date)" > error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt
          echo "Commit: ${{ github.sha }}" >> error_logs.txt
          echo "Commit message: ${{ github.event.head_commit.message }}" >> error_logs.txt

      - name: Upload error logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."

  deploy:
    runs-on: ubuntu-latest
    needs: train

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.22.0

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Display Run ID
        run: |
          echo "Run ID to deploy: $(cat model_info.txt)"

      - name: Check accuracy threshold
        run: |
          python check_threshold.py --threshold 0.85 --model-info model_info.txt

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build \
            --build-arg RUN_ID="$(cat model_info.txt)" \
            --build-arg MLFLOW_TRACKING_URI="${MLFLOW_TRACKING_URI}" \
            --build-arg MLFLOW_TRACKING_USERNAME="${MLFLOW_TRACKING_USERNAME}" \
            --build-arg MLFLOW_TRACKING_PASSWORD="${MLFLOW_TRACKING_PASSWORD}" \
            --tag ml-model:"$(cat model_info.txt)" \
            .
          echo "Docker image built successfully."